name: ecommerce_catalog_manager
version: "0.1.0"
description: "E-commerce cleanup environment"
entry_point: "ecommerce_env:app"
framework: fastapi
tasks:
  - id: "categorize_product"
    name: "categorize_product"
    difficulty: "easy"
    description: "Categorize product titles."
    grader:
      type: "exact_match"
      field: "category"
  - id: "extract_attributes"
    name: "extract_attributes"
    difficulty: "medium"
    description: "Extract product attributes."
    grader:
      type: "partial_match"
      field: "attributes"
  - id: "flag_and_fix"
    name: "flag_and_fix"
    difficulty: "hard"
    description: "Flag items and fix titles."
    grader:
      type: "partial_match"
      field: "flagged_item"