name: ecommerce_catalog_manager
version: "0.1.0"
entry_point: "ecommerce_env:app"
framework: fastapi
tasks:
  - name: categorize_product
    grader:
      type: exact_match
      field: category
  - name: extract_attributes
    grader:
      type: partial_match
      field: attributes
  - name: flag_and_fix
    grader:
      type: partial_match
      field: flagged_item