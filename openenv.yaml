spec_version: 1
name: ecommerce_catalog_manager
type: http
runtime: docker
app: ecommerce_env:app
port: 7860
tasks:
  - id: categorize_product
    name: categorize_product
    difficulty: easy
    description: "Categorize product titles."
    grader:
      type: exact_match
      field: category
      score_range: [0.0, 1.0]
  - id: extract_attributes
    name: extract_attributes
    difficulty: medium
    description: "Extract product attributes."
    grader:
      type: partial_match
      field: attributes
      score_range: [0.0, 1.0]
  - id: flag_and_fix
    name: flag_and_fix
    difficulty: hard
    description: "Flag items and fix titles."
    grader:
      type: partial_match
      field: flagged_item
      score_range: [0.0, 1.0]